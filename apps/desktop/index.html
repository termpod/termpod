<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TermPod</title>
    <style>
      body { margin: 0; background: #1a1b26; }
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1a1b26;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }
      #splash svg { width: 48px; height: 48px; animation: pulse 1.8s ease-in-out infinite; }
      @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    </style>
  </head>
  <body>
    <div id="splash">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="3" width="20" height="18" rx="3" stroke="#7aa2f7" stroke-width="1.5"/>
        <path d="M6 9l4 3-4 3" stroke="#7aa2f7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="12" y1="15" x2="18" y2="15" stroke="#7aa2f7" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
