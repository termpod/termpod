[package]
name = "termpod-desktop"
version = "0.1.0"
edition = "2024"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["devtools"] }
tauri-plugin-pty = "0.2.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
libc = "0.2"

[features]
custom-protocol = ["tauri/custom-protocol"]

[profile.release]
opt-level = 1
