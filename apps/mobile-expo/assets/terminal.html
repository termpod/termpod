<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<style>
  * { margin: 0; padding: 0; }
  html, body { height: 100%; background: #1a1b26; overflow: hidden; }
  #terminal { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="terminal"></div>
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
<script>
const term = new Terminal({
  fontSize: 12,
  fontFamily: 'Menlo, monospace',
  cursorBlink: true,
  allowProposedApi: true,
  theme: {
    background: '#1a1b26',
    foreground: '#c0caf5',
    cursor: '#c0caf5',
    selectionBackground: '#33467c',
  },
});

const fitAddon = new FitAddon.FitAddon();
term.loadAddon(fitAddon);
term.loadAddon(new WebLinksAddon.WebLinksAddon());
term.open(document.getElementById('terminal'));
fitAddon.fit();

// Send terminal input back to React Native
term.onData(function(data) {
  window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'input', data: data }));
});

// Send resize events to React Native
term.onResize(function(size) {
  window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'resize', cols: size.cols, rows: size.rows }));
});

// Listen for messages from React Native
window.addEventListener('message', function(event) {
  try {
    var msg = JSON.parse(event.data);
    if (msg.type === 'write') {
      // Data comes as an array of byte values
      term.write(new Uint8Array(msg.data));
    } else if (msg.type === 'focus') {
      term.focus();
    } else if (msg.type === 'clear') {
      term.clear();
    }
  } catch(e) {}
});

// Handle resize
var resizeObserver = new ResizeObserver(function() {
  fitAddon.fit();
});
resizeObserver.observe(document.getElementById('terminal'));

// Signal ready
window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'ready' }));
</script>
</body>
</html>
