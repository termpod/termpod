name: TermPod
options:
  bundleIdPrefix: dev.termpod
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.0.0"
  LiveKitWebRTC:
    url: https://github.com/livekit/webrtc-xcframework.git
    from: "137.7151.0"
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa.git
    from: "8.40.0"

configFiles:
  Debug: Config.xcconfig
  Release: Config.xcconfig

targets:
  TermPod:
    type: application
    platform: iOS
    sources:
      - TermPod
    resources:
      - TermPod/Resources
    settings:
      base:
        INFOPLIST_FILE: TermPod/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: dev.termpod.mobile
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: termpod
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: true
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: $(TERMPOD_TEAM_ID)
        RELAY_BASE_URL: $(TERMPOD_RELAY_URL)
    dependencies:
      - package: SwiftTerm
      - package: LiveKitWebRTC
      - package: Sentry
        product: SentrySwiftUI

  TermPodTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: TermPod
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
