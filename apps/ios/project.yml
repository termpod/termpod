name: TermPod
options:
  bundleIdPrefix: dev.termpod
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.0.0"
  # WebRTC: Uncomment when stasel/WebRTC supports Xcode 26+ / iOS 26 SDK
  # WebRTC:
  #   url: https://github.com/stasel/WebRTC.git
  #   from: "141.0.0"

targets:
  TermPod:
    type: application
    platform: iOS
    sources:
      - TermPod
    resources:
      - TermPod/Resources
    settings:
      base:
        INFOPLIST_FILE: TermPod/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: dev.termpod.mobile
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: termpod
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: true
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: SwiftTerm
      # - package: WebRTC

  TermPodTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: TermPod
    settings:
      base:
        SWIFT_VERSION: "5.9"
