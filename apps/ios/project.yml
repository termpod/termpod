name: Termpod
options:
  bundleIdPrefix: dev.termpod
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.0.0"

targets:
  Termpod:
    type: application
    platform: iOS
    sources:
      - Termpod
    resources:
      - Termpod/Resources
    settings:
      base:
        INFOPLIST_FILE: Termpod/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: dev.termpod.mobile
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: SwiftTerm

  TermpodTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: Termpod
    settings:
      base:
        SWIFT_VERSION: "5.9"
