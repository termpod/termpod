name: Bug Report
description: Report a bug in TermPod
labels: [bug]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Desktop app (macOS)
        - iOS app
        - Relay server
        - Protocol / shared packages
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Connect to...
        3. See error
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: macOS 15.3 / iOS 18.2
        - TermPod version: 0.1.0
        - Transport: Local / WebRTC / Relay
