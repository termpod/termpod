name: Feature Request
description: Suggest a feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like?
      placeholder: A clear description of the feature.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Why?
      placeholder: What problem does this solve? What's your use case?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Any workarounds or alternative approaches you've thought of.
