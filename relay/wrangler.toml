name = "termpod-relay"
main = "src/worker.ts"
compatibility_date = "2025-03-05"

# DEV ONLY — in production, use: wrangler secret put JWT_SECRET
[vars]
JWT_SECRET = "dev-secret-change-in-production"

[durable_objects]
bindings = [
  { name = "TERMINAL_SESSION", class_name = "TerminalSession" },
  { name = "USER", class_name = "User" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TerminalSession"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["User"]
