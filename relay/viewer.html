<!DOCTYPE html>
<html>
<head>
  <title>Termpod Viewer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1b26; color: #c0caf5; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; }
    #status { padding: 8px 12px; font-size: 13px; background: #16161e; border-bottom: 1px solid #292e42; display: flex; align-items: center; gap: 8px; }
    #status .dot { width: 8px; height: 8px; border-radius: 50%; background: #888; }
    #status .dot.connected { background: #50c878; }
    #status .dot.error { background: #e05050; }
    #controls { padding: 8px 12px; background: #16161e; border-bottom: 1px solid #292e42; display: flex; gap: 8px; align-items: center; }
    #controls input { flex: 1; padding: 6px 10px; background: #1a1b26; border: 1px solid #292e42; color: #c0caf5; border-radius: 4px; font-size: 13px; }
    #controls button { padding: 6px 14px; background: #3d59a1; border: none; color: #c0caf5; border-radius: 4px; cursor: pointer; font-size: 13px; }
    #controls button:hover { background: #4d6ab1; }
    #terminal { flex: 1; }
  </style>
</head>
<body>
  <div id="controls">
    <input id="sessionInput" placeholder="Session ID (leave empty to auto-discover)" />
    <button onclick="connectViewer()">Connect</button>
  </div>
  <div id="status"><span class="dot" id="dot"></span><span id="statusText">Disconnected</span></div>
  <div id="terminal"></div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script>
    const RELAY = 'ws://localhost:8787';
    const RELAY_HTTP = 'http://localhost:8787';
    const CHANNEL_TERMINAL_DATA = 0x00;
    const CHANNEL_SCROLLBACK = 0x02;

    let term, fitAddon, ws;

    function setStatus(text, state) {
      document.getElementById('statusText').textContent = text;
      const dot = document.getElementById('dot');
      dot.className = 'dot' + (state ? ' ' + state : '');
    }

    async function connectViewer() {
      let sessionId = document.getElementById('sessionInput').value.trim();

      if (!sessionId) {
        // Try to create a new session to get the relay working, but we need
        // the desktop's session ID. Let's ask the user.
        setStatus('Enter a session ID (check desktop app console)', 'error');
        return;
      }

      if (term) {
        term.dispose();
      }

      term = new Terminal({
        fontSize: 14,
        fontFamily: 'Menlo, monospace',
        cursorBlink: true,
        theme: { background: '#1a1b26', foreground: '#c0caf5', cursor: '#c0caf5', selectionBackground: '#33467c' },
      });

      fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(document.getElementById('terminal'));
      fitAddon.fit();

      // Send input back to relay (which forwards to desktop PTY)
      term.onData((data) => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          const encoded = new TextEncoder().encode(data);
          const frame = new Uint8Array(1 + encoded.length);
          frame[0] = CHANNEL_TERMINAL_DATA;
          frame.set(encoded, 1);
          ws.send(frame.buffer);
        }
      });

      window.addEventListener('resize', () => fitAddon.fit());

      setStatus('Connecting...', '');

      ws = new WebSocket(`${RELAY}/sessions/${sessionId}/ws`);
      ws.binaryType = 'arraybuffer';

      ws.onopen = () => {
        ws.send(JSON.stringify({
          type: 'hello',
          version: 1,
          role: 'viewer',
          device: 'browser',
          clientId: 'viewer-' + Math.random().toString(36).slice(2, 8),
        }));
      };

      ws.onmessage = (event) => {
        if (event.data instanceof ArrayBuffer) {
          const frame = new Uint8Array(event.data);
          const channel = frame[0];

          if (channel === CHANNEL_TERMINAL_DATA) {
            term.write(frame.slice(1));
          } else if (channel === CHANNEL_SCROLLBACK) {
            // Scrollback chunk: skip 4-byte offset, write data
            term.write(frame.slice(5));
          }
          return;
        }

        const msg = JSON.parse(event.data);
        if (msg.type === 'ready') {
          setStatus(`Connected to session ${sessionId.slice(0, 8)}...`, 'connected');
          term.focus();
        } else if (msg.type === 'session_info') {
          setStatus(`Session: ${msg.name || sessionId.slice(0, 8)} (${msg.clients.length} clients)`, 'connected');
        } else if (msg.type === 'session_ended') {
          setStatus(`Session ended (${msg.reason})`, 'error');
        }
      };

      ws.onclose = () => setStatus('Disconnected', '');
      ws.onerror = () => setStatus('Connection error', 'error');
    }
  </script>
</body>
</html>
